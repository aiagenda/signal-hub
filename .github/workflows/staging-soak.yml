name: Staging Soak Pipeline

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  soak-run:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agents
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            agents/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - name: Full agency cycle (staging dry)
        run: npm run agency:cycle -- --parallel-rss --draft-social
        env:
          SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.STAGING_OPENAI_API_KEY }}
          APP_BASE_URL: ${{ secrets.STAGING_APP_BASE_URL }}
          SOCIAL_POST_DRY_RUN: "true"
          PIPELINE_DISABLE_EXTERNAL_POSTS: "true"
      - name: Process social queue (dry)
        run: npm run social:queue -- --include-drafts --limit=40
        env:
          SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.STAGING_OPENAI_API_KEY }}
          APP_BASE_URL: ${{ secrets.STAGING_APP_BASE_URL }}
          SOCIAL_POST_DRY_RUN: "true"
          PIPELINE_DISABLE_EXTERNAL_POSTS: "true"
