# Heti tartalom-pipeline: RSS scout (összes kategória) → heti draft kiadás.
# Opcionális: állíts be repository secrets + env-t az auto-publish / hírlevélhez (lásd agents/README.md).

name: Weekly agents

on:
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:

concurrency:
  group: weekly-agents-${{ github.ref }}
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: agents/package-lock.json

      - name: Install agents dependencies
        run: npm ci --prefix agents

      - name: Run weekly pipeline (scout → draft)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          APP_BASE_URL: ${{ vars.APP_BASE_URL }}
          NEWSLETTER_WEB_BASE_URL: ${{ vars.NEWSLETTER_WEB_BASE_URL }}
          # Csak akkor kapcsold be, ha elfogadod a kockázatot (nincs emberi review ugyanabban a futásban):
          # AUTO_PUBLISH_LATEST_DRAFT: "true"
          # SEND_NEWSLETTER_AFTER_PUBLISH: "true"
          # RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          # RESEND_FROM: ${{ vars.RESEND_FROM }}
        run: npm run weekly:pipeline --prefix agents
