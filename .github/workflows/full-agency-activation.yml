# Egyszeri / manuális teljes futás: teljes ügynök-pipeline + publikálás + városi cikk + heti kiadás vázlat publikálása.
# Futtatás: Actions → „Full agency activation” → Run workflow.
#
# Nem küld hírlevelet és nem hív éles social webhookot — csak a repo többi workflow-jában állítható be.

name: Full agency activation

on:
  workflow_dispatch:

concurrency:
  group: full-agency-activation-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run-all:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agents

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: agents/package-lock.json

      - name: Install agents dependencies
        run: npm ci

      - name: "1/4 — Teljes agency cycle (RSS ‖ → téma → cikk → SEO → publish + social draft + esemény scout)"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          APP_BASE_URL: ${{ vars.APP_BASE_URL }}
          NEWSLETTER_WEB_BASE_URL: ${{ vars.NEWSLETTER_WEB_BASE_URL }}
          PIPELINE_DISABLE_EXTERNAL_POSTS: ${{ vars.PIPELINE_DISABLE_EXTERNAL_POSTS }}
          SOCIAL_POST_DRY_RUN: "true"
        run: npm run agency:cycle -- --parallel-rss --publish-article --draft-social

      - name: "2/4 — Tech stack agency (technikai RSS ‖ → tech téma → longform → publish + draft)"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          APP_BASE_URL: ${{ vars.APP_BASE_URL }}
          PIPELINE_DISABLE_EXTERNAL_POSTS: ${{ vars.PIPELINE_DISABLE_EXTERNAL_POSTS }}
          SOCIAL_POST_DRY_RUN: "true"
        run: npm run agency:tech -- --parallel-rss --publish-article --draft-social

      - name: "3/4 — Napi városi / program cikk (esemény scout már volt → skip) + publish + draft"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          APP_BASE_URL: ${{ vars.APP_BASE_URL }}
          PIPELINE_DISABLE_EXTERNAL_POSTS: ${{ vars.PIPELINE_DISABLE_EXTERNAL_POSTS }}
          SOCIAL_POST_DRY_RUN: "true"
        run: npm run write:city-brief -- --publish-article --draft-social --skip-event-scout

      - name: "4/4 — Heti kiadás: új vázlat a már betárolt tartalomból + automatikus publikálás (hírlevél nem)"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          APP_BASE_URL: ${{ vars.APP_BASE_URL }}
          NEWSLETTER_WEB_BASE_URL: ${{ vars.NEWSLETTER_WEB_BASE_URL }}
          PIPELINE_DISABLE_EXTERNAL_POSTS: ${{ vars.PIPELINE_DISABLE_EXTERNAL_POSTS }}
        run: npm run weekly:pipeline -- --skip-scout --publish-latest-draft
