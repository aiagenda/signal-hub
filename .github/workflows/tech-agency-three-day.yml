# ~3 naponta: csak AI + tool + builder RSS → tech_stack témaötletek → 1 longform cikk (+ SEO).
# Cron: havonta 1.,4.,7., … nap (~3 napos ritmus). Opcionális publish + draft + social webhook.
#
# Variables: TECH_3DAY_PUBLISH=true, TECH_3DAY_SOCIAL_DRAFT=true, TECH_3DAY_SOCIAL_LIVE=true
# Secrets: SUPABASE_* , OPENAI_*, opcionális SOCIAL_* (live queue-hoz).

name: Tech agency (~3-day longform)

on:
  schedule:
    - cron: "0 9 */3 * *"
  workflow_dispatch:

concurrency:
  group: tech-agency-3d-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tech:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agents

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: agents/package-lock.json

      - name: Install agents dependencies
        run: npm ci

      - name: Tech stack agency cycle (RSS paralell + tema + longform + SEO)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          APP_BASE_URL: ${{ vars.APP_BASE_URL }}
          PIPELINE_DISABLE_EXTERNAL_POSTS: ${{ vars.PIPELINE_DISABLE_EXTERNAL_POSTS }}
          SOCIAL_POST_DRY_RUN: "true"
        run: |
          set -e
          FLAGS="--parallel-rss"
          [ "${{ vars.TECH_3DAY_PUBLISH }}" = "true" ] && FLAGS="$FLAGS --publish-article"
          [ "${{ vars.TECH_3DAY_SOCIAL_DRAFT }}" = "true" ] && FLAGS="$FLAGS --draft-social"
          npm run agency:tech -- $FLAGS

      - name: Social queue (optional — webhook)
        if: ${{ vars.TECH_3DAY_SOCIAL_LIVE == 'true' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          APP_BASE_URL: ${{ vars.APP_BASE_URL }}
          SOCIAL_POST_DRY_RUN: "false"
          PIPELINE_DISABLE_EXTERNAL_POSTS: ${{ vars.PIPELINE_DISABLE_EXTERNAL_POSTS }}
          SOCIAL_WEBHOOK_SECRET: ${{ secrets.SOCIAL_WEBHOOK_SECRET }}
          SOCIAL_LINKEDIN_WEBHOOK_URL: ${{ secrets.SOCIAL_LINKEDIN_WEBHOOK_URL }}
          SOCIAL_X_WEBHOOK_URL: ${{ secrets.SOCIAL_X_WEBHOOK_URL }}
          SOCIAL_FACEBOOK_WEBHOOK_URL: ${{ secrets.SOCIAL_FACEBOOK_WEBHOOK_URL }}
          SOCIAL_TELEGRAM_WEBHOOK_URL: ${{ secrets.SOCIAL_TELEGRAM_WEBHOOK_URL }}
        run: npm run social:queue -- --include-drafts --limit=40
